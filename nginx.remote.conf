        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location = /api/v1/support-requests {
        proxy_pass http://bourse-azma-api:9003/api/v1/support-requests;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /api/v1/admin/support-requests/ {
        proxy_pass http://bourse-azma-api:9003/api/v1/admin/support-requests/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location = /api/v1/admin/support-requests {
        proxy_pass http://bourse-azma-api:9003/api/v1/admin/support-requests;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
